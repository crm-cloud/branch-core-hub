name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile || bun install

      - name: Type check
        run: bunx tsc --noEmit

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bunx vitest run --passWithNoTests

      - name: Build
        run: bun run build

      - name: Bundle size guard
        run: |
          set -e
          ENTRY_LIMIT=256000   # 250 KB gzip — initial entry chunk
          CHUNK_LIMIT=614400   # 600 KB gzip — any single chunk
          echo "Top 10 chunks by gzip size:"
          for f in dist/assets/*.js; do
            gz=$(gzip -c "$f" | wc -c)
            printf '%10d  %s\n' "$gz" "$f"
          done | sort -nr | head -10
          echo ""
          fail=0
          for f in dist/assets/index-*.js; do
            gz=$(gzip -c "$f" | wc -c)
            if [ "$gz" -gt "$ENTRY_LIMIT" ]; then
              echo "::error::Entry chunk $f is $gz bytes gzip (limit $ENTRY_LIMIT)"
              fail=1
            fi
          done
          for f in dist/assets/*.js; do
            gz=$(gzip -c "$f" | wc -c)
            if [ "$gz" -gt "$CHUNK_LIMIT" ]; then
              echo "::error::Chunk $f is $gz bytes gzip (limit $CHUNK_LIMIT)"
              fail=1
            fi
          done
          exit $fail

      - name: Direct comm-log write guard
        run: |
          set +e
          # Edge functions must call dispatch-communication, never insert into
          # communication_logs directly (except dispatch-communication itself).
          MATCHES=$(grep -RnoE \
            "from\\(['\"]communication_logs['\"]\\)\\.(insert|upsert)" \
            supabase/functions 2>/dev/null \
            | grep -v "supabase/functions/dispatch-communication/")
          if [ -n "$MATCHES" ]; then
            echo "::error::Edge functions must route through dispatch-communication:"
            echo "$MATCHES"
            exit 1
          fi
          echo "Comm-log write guard passed."

      - name: Direct-write guard (services-only)
        run: |
          # Forbid bare from('<critical-table>').(insert|update|delete) outside its
          # owning service module. Atomic RPCs must be used instead.
          set +e
          MATCHES=$(grep -RnoE \
            "from\\('(invoices|invoice_items|payments|memberships|wallet_transactions|attendance|lockers|locker_assignments|benefit_bookings|membership_freeze_history)'\\)\\.(insert|update|delete)" \
            src/components src/pages src/hooks 2>/dev/null)
          if [ -n "$MATCHES" ]; then
            echo "::error::Direct mutating writes to critical tables found outside services/ — use the atomic RPC instead:"
            echo "$MATCHES"
            exit 1
          fi
          echo "Direct-write guard passed."
