name: DR Nightly Backup

on:
  schedule:
    # 02:30 IST = 21:00 UTC
    - cron: "0 21 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        run: |
          curl -fsSL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz \
            | tar -xz -C /usr/local/bin supabase
          supabase --version

      - name: Install jq, psql
        run: sudo apt-get update && sudo apt-get install -y jq postgresql-client

      - name: Run backup
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PRIMARY_PROJECT_REF:   ${{ secrets.PRIMARY_PROJECT_REF }}
          DR_PROJECT_REF:        ${{ secrets.DR_PROJECT_REF }}
          DR_BUCKET:             ${{ secrets.DR_BUCKET }}
          PRIMARY_DB_URL:        ${{ secrets.PRIMARY_DB_URL }}
        run: |
          chmod +x scripts/dr/backup.sh
          scripts/dr/backup.sh

      - name: Upload manifest as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dr-manifest
          path: _dr-out/**/manifest.json
          retention-days: 30
