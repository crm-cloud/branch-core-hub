    <!-- Self-hosted Oswald (one variable woff2 covers 400–700) — removes the
         chained fonts.googleapis.com -> fonts.gstatic.com hops from the
         critical path. -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/oswald/oswald-latin.woff2"
      crossorigin
    />
    <style>
      @font-face {
        font-family: 'Oswald';
        font-style: normal;
        font-weight: 400 700;
        font-display: swap;
        src: url('/fonts/oswald/oswald-latin.woff2') format('woff2');
        unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: 'Oswald';
        font-style: normal;
        font-weight: 400 700;
        font-display: swap;
        src: url('/fonts/oswald/oswald-latin-ext.woff2') format('woff2');
        unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;
      }
      /* Critical hero styles — inlined so the LCP element paints from the
         initial HTML response, before the main app CSS/JS are parsed. The
         React app renders an identical hero on top once it boots. */
      /* Pre-paint background matches the React landing wrapper so there is
         no color flash between initial HTML and React hydration. */
      html, body { background: #f1f5f9; }
    </style>
