[build]
  command = "bun run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/app-config.json"
  [headers.values]
    Cache-Control = "no-store, max-age=0"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/healthz.json"
  [headers.values]
    Cache-Control = "no-store, max-age=0"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
