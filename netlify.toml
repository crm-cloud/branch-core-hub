[build]
  command = "bun run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/app-config.json"
  [headers.values]
    Cache-Control = "no-store, max-age=0"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/healthz.json"
  [headers.values]
    Cache-Control = "no-store, max-age=0"
    Access-Control-Allow-Origin = "*"

# Long-cache for the brand logo — its filename is stable and the bytes only
# change when we deploy a new asset. This eliminates the Lighthouse "use
# efficient cache lifetimes" warning for /incline-logo.png.
[[headers]]
  for = "/incline-logo.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
